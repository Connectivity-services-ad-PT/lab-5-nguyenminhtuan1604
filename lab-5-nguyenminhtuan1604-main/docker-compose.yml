networks:
  team-internal:
    driver: bridge

volumes:
  postgres-data:

services:
  db:
    image: postgres:16-alpine
    container_name: fit4110-db-lab05
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-core_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-core_pass}
      POSTGRES_DB: ${POSTGRES_DB:-core_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-core_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: fit4110-ai-lab05
    restart: unless-stopped
    environment:
      SERVICE_VERSION: ${SERVICE_VERSION:-v0.1.0-team-core}
    ports:
      - "9000:9000"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-core-lab05
    restart: unless-stopped
    environment:
      APP_PORT: ${APP_PORT:-8000}
      SERVICE_VERSION: ${SERVICE_VERSION:-v0.1.0-team-core}
      AUTH_TOKEN: ${AUTH_TOKEN:-lab-compose-token}
      DATABASE_URL: postgresql://${POSTGRES_USER:-core_user}:${POSTGRES_PASSWORD:-core_pass}@db:5432/${POSTGRES_DB:-core_db}
      AI_SERVICE_URL: http://ai-service:9000
    ports:
      - "${APP_PORT:-8000}:8000"
    networks:
      - team-internal
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
